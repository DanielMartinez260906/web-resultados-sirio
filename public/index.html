<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Laboratorio Clínico SIRIO</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Estilos Premium -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <img src="logo.png" alt="Laboratorio Sirio Logo" style="max-width: 320px; width: 100%; height: auto; margin-bottom: 0.5rem;">
        <p>Portal Web de Resultados y Análisis Clínicos</p>
      </div>

      <!-- Alerta de Error -->
      <div id="login-alert" class="alert alert-error" style="display: none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="alert-message">Credenciales incorrectas.</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Nombre de Usuario</label>
          <div style="position: relative;">
            <i class="fa-solid fa-user" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dark);"></i>
            <input type="text" id="username" class="form-control" placeholder="Ej: pedro.gonzalez" style="padding-left: 46px;" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div style="position: relative;">
            <i class="fa-solid fa-lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dark);"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" style="padding-left: 46px;" required autocomplete="current-password">
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" checked>
            <span>Recordarme</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 1rem; margin-top: 1rem;">
          <i class="fa-solid fa-right-to-bracket"></i> Ingresar al Portal
        </button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Laboratorio Clínico SIRIO. Todos los derechos reservados.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script>
    // Verificar si ya hay una sesión activa al cargar la página
    document.addEventListener('DOMContentLoaded', () => {
      SirioAuth.checkSession();
      
      const form = document.getElementById('login-form');
      const alertBox = document.getElementById('login-alert');
      const alertMsg = document.getElementById('alert-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember-me').checked;

        alertBox.style.display = 'none';
        SirioAuth.showLoading('Autenticando...');

        const result = await SirioAuth.login(username, password, rememberMe);
        
        SirioAuth.hideLoading();

        if (result.success) {
          // Redirigir según el rol del usuario retornado
          if (result.user.rol === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'client.html';
          }
        } else {
          // Mostrar mensaje de error
          alertMsg.innerText = result.message;
          alertBox.style.display = 'flex';
        }
      });
    });
  </script>
</body>
</html>
