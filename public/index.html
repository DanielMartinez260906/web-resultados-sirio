<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Iniciar sesión en el portal de resultados - Laboratorio Clínico SIRIO">
  <title>Iniciar Sesión - Laboratorio Clínico SIRIO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Botón de tema flotante -->
  <div style="position: fixed; top: 16px; right: 16px; z-index: 1000;">
    <button class="btn btn-secondary btn-icon" id="theme-toggle"
            style="border-radius: 50%; width: 44px; height: 44px;" title="Cambiar tema">
      <i class="fa-solid fa-sun"></i>
    </button>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand-header">
        <img src="logo.png" alt="Laboratorio Sirio Logo"
             style="max-width: 280px; width: 100%; height: auto; margin: 0 auto 0.75rem auto;">
        <p>Portal Web de Resultados y Análisis Clínicos</p>
      </div>

      <!-- Alerta de Error -->
      <div id="login-alert" class="alert alert-error" style="display: none;">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="alert-message">Credenciales incorrectas.</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Nombre de Usuario</label>
          <div style="position: relative;">
            <i class="fa-solid fa-user"
               style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dark); pointer-events: none;"></i>
            <input type="text" id="username" class="form-control"
                   placeholder="Ej: pedro.gonzalez"
                   style="padding-left: 46px;"
                   required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div style="position: relative;">
            <i class="fa-solid fa-lock"
               style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dark); pointer-events: none;"></i>
            <input type="password" id="password" class="form-control"
                   placeholder="••••••••"
                   style="padding-left: 46px; padding-right: 50px;"
                   required autocomplete="current-password">
            <button type="button" id="toggle-password"
                    style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
                           background: none; border: none; cursor: pointer; color: var(--text-dark);
                           padding: 4px; display: flex; align-items: center; justify-content: center;
                           transition: color 0.2s;" title="Mostrar/ocultar contraseña">
              <i class="fa-solid fa-eye" id="toggle-password-icon"></i>
            </button>
          </div>
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" checked>
            <span>Recordarme</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 14px; font-size: 1rem; margin-top: 0.5rem;">
          <i class="fa-solid fa-right-to-bracket"></i> Ingresar al Portal
        </button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Laboratorio Clínico SIRIO. Todos los derechos reservados.</p>
    <div class="developer-credits">
      <span class="dev-credits-label">Desarrollado por</span>
      <div class="dev-credits-brand">
        <a href="https://wa.me/573053234702?text=Hola%20DAMEDIA%2C%20me%20interesa%20obtener%20informaci%C3%B3n%20sobre%20un%20software." target="_blank" rel="noopener noreferrer" class="dev-link" title="Contactar a DAMEDIA por WhatsApp">
          <img src="img/damedia-icon.png" alt="DAMEDIA Isotipo" class="dev-icon">
          <img src="img/damedia-logo.png" alt="DAMEDIA Logotipo" class="dev-logo">
        </a>
      </div>
      <span class="dev-credits-tagline">Desarrollamos software, impulsamos empresas.</span>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      SirioAuth.checkSession();

      const form = document.getElementById('login-form');
      const alertBox = document.getElementById('login-alert');
      const alertMsg = document.getElementById('alert-message');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember-me').checked;

        alertBox.style.display = 'none';
        SirioAuth.showLoading('Autenticando...');

        const result = await SirioAuth.login(username, password, rememberMe);

        SirioAuth.hideLoading();

        if (result.success) {
          if (result.user.rol === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'client.html';
          }
        } else {
          alertMsg.innerText = result.message;
          alertBox.style.display = 'flex';
        }
      });
      // Toggle mostrar/ocultar contraseña
      const toggleBtn  = document.getElementById('toggle-password');
      const toggleIcon = document.getElementById('toggle-password-icon');
      const pwdInput   = document.getElementById('password');
      toggleBtn.addEventListener('click', () => {
        const isHidden = pwdInput.type === 'password';
        pwdInput.type  = isHidden ? 'text' : 'password';
        toggleIcon.className = isHidden ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        toggleBtn.style.color = isHidden ? 'var(--color-primary)' : 'var(--text-dark)';
      });
    });
  </script>
</body>
</html>
